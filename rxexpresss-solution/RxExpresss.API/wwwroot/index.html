<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RX Expresss - Login</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>RX Expresss</h1>
        <p>Pharmacy Delivery Service</p>
        <div id="alert-area"></div>
        <form id="login-form">
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="email" placeholder="Enter your email" required></div>
            <div class="form-group"><label>Password</label><input type="password" class="form-control" id="password" placeholder="Enter your password" required></div>
            <button type="submit" class="btn btn-primary btn-lg w-full" id="login-btn">Sign In</button>
        </form>
        <div class="mt-3 text-center text-sm text-gray">
            <strong>Test Accounts:</strong><br>
            Admin: admin@rxexpresss.com / Admin@123<br>
            Pharmacy: pharmacy@test.com / Pharmacy@123<br>
            Driver: driver@test.com / Driver@123
        </div>
    </div>
</div>
<script src="/js/api-service.js"></script>
<script>
    if (ApiService.isLoggedIn()) { const u = ApiService.getUser(); if (u) window.location.href = `/${u.role.toLowerCase()}/index.html`; }
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
        try {
            const d = await ApiService.login(document.getElementById('email').value, document.getElementById('password').value);
            if (d) window.location.href = `/${d.user.role.toLowerCase()}/index.html`;
        } catch (err) { showAlert('alert-area', 'danger', err.message); }
        btn.disabled = false; btn.textContent = 'Sign In';
    });
</script>
</body></html>
