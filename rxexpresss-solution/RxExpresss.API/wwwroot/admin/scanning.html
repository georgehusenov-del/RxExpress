<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QR Scanning - RX Expresss Admin</title><link rel="stylesheet" href="/css/style.css">
<style>
.scan-area{max-width:500px;margin:0 auto;text-align:center}
.scan-input-group{display:flex;gap:8px;margin-bottom:20px}
.scan-input-group input{flex:1}
.scan-result{padding:20px;border-radius:var(--radius);border:2px solid var(--border);margin-top:16px;text-align:left}
.scan-result.success{border-color:var(--success);background:#dcfce7}
.scan-result.error{border-color:var(--danger);background:#fee2e2}
.scan-result .sr-title{font-size:18px;font-weight:700;margin-bottom:12px}
.scan-result .sr-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.1);font-size:14px}
.scan-result .sr-row:last-child{border:none}
.scan-result .sr-row .label{color:var(--gray);font-weight:500}
</style>
</head><body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand"><h2>RX Expresss</h2><small>Admin Panel</small></div><nav class="sidebar-nav" id="sidebar-nav"></nav><div class="sidebar-footer" id="sidebar-footer"></div></aside>
    <main class="main-content">
        <div class="topbar"><h1>QR Code Scanning</h1></div>
        <div class="page-body">
            <div id="alert-area"></div>
            <div class="scan-area">
                <div class="stat-icon teal" style="width:64px;height:64px;border-radius:16px;margin:0 auto 16px">${Icons.qrcode}</div>
                <h3 class="mb-1">Scan or Enter QR Code</h3>
                <p class="text-gray text-sm mb-2">Enter the package QR code to verify and view details</p>
                <div class="scan-input-group">
                    <input type="text" class="form-control" id="qr-input" placeholder="e.g. Q4F2A1, M0D3EB" autofocus>
                    <button class="btn btn-primary" onclick="scanQr()">Scan</button>
                </div>
                <div id="scan-result"></div>
            </div>
            <div class="card mt-3">
                <div class="card-header">Recent Scans</div>
                <div class="card-body" id="scan-history"><p class="text-center text-gray">No scans yet</p></div>
            </div>
        </div>
    </main>
</div>
<script src="/js/api-service.js"></script>
<script>
if(!ApiService.requireAuth('Admin'))throw'';
const nav=[{id:'overview',label:'Overview',href:'/admin/index.html',icon:Icons.dashboard},{id:'users',label:'Users',href:'/admin/users.html',icon:Icons.users},{id:'pharmacies',label:'Pharmacies',href:'/admin/pharmacies.html',icon:Icons.pharmacy},{id:'drivers',label:'Drivers',href:'/admin/drivers.html',icon:Icons.truck},{id:'orders',label:'Orders',href:'/admin/orders.html',icon:Icons.package},{id:'routes',label:'Routes',href:'/admin/routes.html',icon:Icons.route},{id:'pricing',label:'Pricing',href:'/admin/pricing.html',icon:Icons.dollar},{id:'scanning',label:'QR Scanning',href:'/admin/scanning.html',icon:Icons.qrcode},{id:'zones',label:'Service Zones',href:'/admin/zones.html',icon:Icons.mapPin},{id:'reports',label:'Reports',href:'/admin/reports.html',icon:Icons.barChart}];
setupSidebar(nav,'scanning');

document.getElementById('qr-input').addEventListener('keydown',e=>{if(e.key==='Enter')scanQr()});

const scanHistory=[];

async function scanQr(){
    const code=document.getElementById('qr-input').value.trim();
    if(!code){showAlert('alert-area','danger','Please enter a QR code');return;}
    const el=document.getElementById('scan-result');
    try{
        const d=await ApiService.post(`/admin/scan/${code}`,{});
        const p=d.package;
        el.innerHTML=`<div class="scan-result success">
            <div class="sr-title">Package Verified!</div>
            <div class="sr-row"><span class="label">Order #</span><span>${p.orderNumber}</span></div>
            <div class="sr-row"><span class="label">QR Code</span><span><strong>${p.qrCode}</strong></span></div>
            <div class="sr-row"><span class="label">Pharmacy</span><span>${p.pharmacyName||'-'}</span></div>
            <div class="sr-row"><span class="label">Recipient</span><span>${p.recipientName}</span></div>
            <div class="sr-row"><span class="label">Address</span><span>${p.address}</span></div>
            <div class="sr-row"><span class="label">Status</span><span>${statusBadge(p.status)}</span></div>
            <div class="sr-row"><span class="label">Driver</span><span>${p.driverName||'Unassigned'}</span></div>
            ${p.copayAmount>0?`<div class="sr-row"><span class="label">Copay</span><span>$${p.copayAmount.toFixed(2)} ${p.copayCollected?'(Collected)':'(Pending)'}</span></div>`:''}
        </div>`;
        scanHistory.unshift({code:p.qrCode,order:p.orderNumber,recipient:p.recipientName,status:p.status,time:new Date().toLocaleTimeString()});
        renderHistory();
    }catch(e){
        el.innerHTML=`<div class="scan-result error"><div class="sr-title">Not Found</div><p>No package found with QR code: <strong>${code}</strong></p></div>`;
    }
    document.getElementById('qr-input').value='';
    document.getElementById('qr-input').focus();
}

function renderHistory(){
    document.getElementById('scan-history').innerHTML=scanHistory.length?`<table><thead><tr><th>QR Code</th><th>Order</th><th>Recipient</th><th>Status</th><th>Time</th></tr></thead><tbody>${scanHistory.map(s=>`<tr><td><strong>${s.code}</strong></td><td>${s.order}</td><td>${s.recipient}</td><td>${statusBadge(s.status)}</td><td>${s.time}</td></tr>`).join('')}</tbody></table>`:'<p class="text-center text-gray">No scans yet</p>';
}
</script>
</body></html>
