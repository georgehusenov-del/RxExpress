<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Users - RX Expresss</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav class="navbar"><a href="/admin/index.html" class="brand">RX Expresss</a>
    <div class="nav-links"><a href="/admin/index.html">Dashboard</a><a href="/admin/orders.html">Orders</a><a href="/admin/drivers.html">Drivers</a><a href="/admin/users.html" class="active">Users</a></div>
    <div class="user-info" id="nav-user"></div>
</nav>
<div class="container">
    <div class="page-header"><h1>Users Management</h1>
        <select class="form-control" style="width:160px" id="role-filter" onchange="loadUsers()">
            <option value="">All Roles</option><option value="Admin">Admin</option><option value="Pharmacy">Pharmacy</option><option value="Driver">Driver</option><option value="Patient">Patient</option>
        </select>
    </div>
    <div id="alert-area"></div>
    <div class="card"><div class="card-body table-responsive">
        <table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Active</th><th>Joined</th></tr></thead>
        <tbody id="users-table"><tr><td colspan="6" class="text-center"><span class="spinner"></span></td></tr></tbody></table>
    </div></div>
</div>
<script src="/js/api-service.js"></script>
<script>
    if (!ApiService.requireAuth('Admin')) throw '';
    setupNav();
    async function loadUsers() {
        const role = document.getElementById('role-filter').value;
        const url = role ? `/admin/users?role=${role}` : '/admin/users';
        const data = await ApiService.get(url);
        const tbody = document.getElementById('users-table');
        if (!data.users.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-gray">No users</td></tr>'; return; }
        tbody.innerHTML = data.users.map(u => `<tr>
            <td><strong>${u.firstName} ${u.lastName}</strong></td><td>${u.email}</td><td>${u.phone || '-'}</td>
            <td><span class="badge-role">${u.role}</span></td>
            <td>${u.isActive ? '<span class="text-success">Active</span>' : '<span class="text-danger">Inactive</span>'}</td>
            <td>${formatDate(u.createdAt)}</td>
        </tr>`).join('');
    }
    loadUsers();
</script>
</body>
</html>
