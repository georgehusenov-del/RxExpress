<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Users - RX Expresss Admin</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand"><h2>RX Expresss</h2><small>Admin Panel</small></div><nav class="sidebar-nav" id="sidebar-nav"></nav><div class="sidebar-footer" id="sidebar-footer"></div></aside>
    <main class="main-content">
        <div class="topbar"><h1>Users Management</h1><select class="form-control" style="width:160px" id="rf" onchange="load()"><option value="">All Roles</option><option value="Admin">Admin</option><option value="Pharmacy">Pharmacy</option><option value="Driver">Driver</option><option value="Patient">Patient</option></select></div>
        <div class="page-body"><div id="alert-area"></div>
            <div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Active</th><th>Joined</th></tr></thead><tbody id="tbl"></tbody></table></div></div>
        </div>
    </main>
</div>
<script src="/js/api-service.js"></script>
<script>
if(!ApiService.requireAuth('Admin'))throw'';
const nav=[{id:'overview',label:'Overview',href:'/admin/index.html',icon:Icons.dashboard},{id:'users',label:'Users',href:'/admin/users.html',icon:Icons.users},{id:'pharmacies',label:'Pharmacies',href:'/admin/pharmacies.html',icon:Icons.pharmacy},{id:'drivers',label:'Drivers',href:'/admin/drivers.html',icon:Icons.truck},{id:'orders',label:'Orders',href:'/admin/orders.html',icon:Icons.package},{id:'routes',label:'Routes',href:'/admin/routes.html',icon:Icons.route},{id:'pricing',label:'Pricing',href:'/admin/pricing.html',icon:Icons.dollar},{id:'scanning',label:'QR Scanning',href:'/admin/scanning.html',icon:Icons.qrcode},{id:'zones',label:'Service Zones',href:'/admin/zones.html',icon:Icons.mapPin},{id:'reports',label:'Reports',href:'/admin/reports.html',icon:Icons.barChart}];
setupSidebar(nav,'users');
async function load(){const r=document.getElementById('rf').value;const d=await ApiService.get(r?`/admin/users?role=${r}`:'/admin/users');document.getElementById('tbl').innerHTML=d.users.length?d.users.map(u=>`<tr><td><strong>${u.firstName} ${u.lastName}</strong></td><td>${u.email}</td><td>${u.phone||'-'}</td><td><span class="badge badge-available">${u.role}</span></td><td>${u.isActive?'<span class="text-success">Active</span>':'<span class="text-danger">Inactive</span>'}</td><td>${formatDate(u.createdAt)}</td></tr>`).join(''):'<tr><td colspan="6" class="text-center text-gray">No users</td></tr>';}
load();
</script>
</body></html>
