<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Orders - RX Expresss Admin</title><link rel="stylesheet" href="/css/style.css">
<style>.order-detail{display:grid;grid-template-columns:1fr 1fr;gap:16px}.order-detail .od-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}.od-row .label{color:var(--gray)}</style>
</head><body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand"><h2>RX Expresss</h2><small>Admin Panel</small></div><nav class="sidebar-nav" id="sidebar-nav"></nav><div class="sidebar-footer" id="sidebar-footer"></div></aside>
    <main class="main-content">
        <div class="topbar"><h1>Orders Management</h1>
            <div class="d-flex gap-2 items-center">
                <select class="form-control" style="width:160px" id="sf" onchange="load()"><option value="">All Statuses</option><option value="new">New</option><option value="assigned">Assigned</option><option value="picked_up">Picked Up</option><option value="in_transit">In Transit</option><option value="out_for_delivery">Out for Delivery</option><option value="delivered">Delivered</option><option value="failed">Failed</option></select>
            </div>
        </div>
        <div class="page-body"><div id="alert-area"></div>
            <div class="card"><div class="card-body table-wrap"><table><thead><tr><th>Order #</th><th>QR</th><th>Pharmacy</th><th>Recipient</th><th>City</th><th>Type</th><th>Copay</th><th>Status</th><th>Driver</th><th>Actions</th></tr></thead><tbody id="tbl"></tbody></table></div></div>
        </div>
    </main>
</div>
<!-- Status Modal -->
<div class="modal-overlay" id="status-modal"><div class="modal"><div class="modal-header"><h3>Update Order</h3><button class="close-btn" onclick="closeModal('status-modal')">&times;</button></div><div class="modal-body"><input type="hidden" id="m-id">
    <div class="form-group"><label>Status</label><select class="form-control" id="m-status"><option value="new">New</option><option value="assigned">Assigned</option><option value="picked_up">Picked Up</option><option value="in_transit">In Transit</option><option value="out_for_delivery">Out for Delivery</option><option value="delivered">Delivered</option><option value="failed">Failed</option><option value="cancelled">Cancelled</option></select></div>
    <div class="form-group"><label>Assign Driver</label><select class="form-control" id="m-driver"><option value="">-- No Change --</option></select></div>
</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('status-modal')">Cancel</button><button class="btn btn-primary" onclick="doUpdate()">Save</button></div></div></div>
<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal"><div class="modal" style="max-width:600px"><div class="modal-header"><h3>Order Details</h3><button class="close-btn" onclick="closeModal('detail-modal')">&times;</button></div><div class="modal-body" id="detail-body"></div></div></div>
<script src="/js/api-service.js"></script>
<script>
if(!ApiService.requireAuth('Admin'))throw'';
const nav=[{id:'overview',label:'Overview',href:'/admin/index.html',icon:Icons.dashboard},{id:'users',label:'Users',href:'/admin/users.html',icon:Icons.users},{id:'pharmacies',label:'Pharmacies',href:'/admin/pharmacies.html',icon:Icons.pharmacy},{id:'drivers',label:'Drivers',href:'/admin/drivers.html',icon:Icons.truck},{id:'orders',label:'Orders',href:'/admin/orders.html',icon:Icons.package},{id:'routes',label:'Routes',href:'/admin/routes.html',icon:Icons.route},{id:'pricing',label:'Pricing',href:'/admin/pricing.html',icon:Icons.dollar},{id:'scanning',label:'QR Scanning',href:'/admin/scanning.html',icon:Icons.qrcode},{id:'zones',label:'Service Zones',href:'/admin/zones.html',icon:Icons.mapPin},{id:'reports',label:'Reports',href:'/admin/reports.html',icon:Icons.barChart}];
setupSidebar(nav,'orders');

let drivers=[];
(async()=>{const d=await ApiService.get('/admin/drivers');drivers=d.drivers;})();

function closeModal(id){document.getElementById(id).classList.remove('active')}

async function load(){
    const s=document.getElementById('sf').value;
    const d=await ApiService.get(s?`/admin/orders?status=${s}`:'/admin/orders');
    document.getElementById('tbl').innerHTML=d.orders.length?d.orders.map(o=>`<tr>
        <td><a href="#" onclick="showDetail(${o.id});return false" style="color:var(--primary);font-weight:600">${o.orderNumber}</a></td>
        <td><strong>${o.qrCode||'-'}</strong></td><td>${o.pharmacyName||'-'}</td><td>${o.recipientName}</td>
        <td>${o.city}</td><td>${o.deliveryType}</td>
        <td>${o.copayAmount>0?`<span class="${o.copayCollected?'text-success':'text-warning'}">$${o.copayAmount.toFixed(2)}</span>`:'$0'}</td>
        <td>${statusBadge(o.status)}</td><td>${o.driverName||'<span class="text-gray">Unassigned</span>'}</td>
        <td><button class="btn btn-sm btn-outline" onclick="openEdit(${o.id},'${o.status}')">Edit</button></td>
    </tr>`).join(''):'<tr><td colspan="10" class="text-center text-gray">No orders</td></tr>';
}

function openEdit(id,s){
    document.getElementById('m-id').value=id;document.getElementById('m-status').value=s;
    const sel=document.getElementById('m-driver');
    sel.innerHTML='<option value="">-- No Change -->'+drivers.map(d=>`<option value="${d.id}">${d.user?.firstName||''} ${d.user?.lastName||''}</option>`).join('');
    document.getElementById('status-modal').classList.add('active');
}

async function doUpdate(){
    const id=document.getElementById('m-id').value;
    const status=document.getElementById('m-status').value;
    const driverId=document.getElementById('m-driver').value;
    await ApiService.put(`/admin/orders/${id}/status`,{status});
    if(driverId)await ApiService.put(`/admin/orders/${id}/assign`,{driverId:parseInt(driverId)});
    closeModal('status-modal');showAlert('alert-area','success','Order updated!');load();
}

async function showDetail(id){
    const o=await ApiService.get(`/orders/${id}`);
    document.getElementById('detail-body').innerHTML=`
        <div class="order-detail">
            <div><div class="od-row"><span class="label">Order #</span><span><strong>${o.orderNumber}</strong></span></div>
            <div class="od-row"><span class="label">QR Code</span><span><strong style="color:var(--primary)">${o.qrCode||'-'}</strong></span></div>
            <div class="od-row"><span class="label">Status</span><span>${statusBadge(o.status)}</span></div>
            <div class="od-row"><span class="label">Type</span><span>${o.deliveryType}</span></div>
            <div class="od-row"><span class="label">Driver</span><span>${o.driverName||'Unassigned'}</span></div>
            <div class="od-row"><span class="label">Created</span><span>${formatDate(o.createdAt)}</span></div></div>
            <div><div class="od-row"><span class="label">Recipient</span><span>${o.recipientName}</span></div>
            <div class="od-row"><span class="label">Phone</span><span>${o.recipientPhone}</span></div>
            <div class="od-row"><span class="label">Address</span><span>${o.street}, ${o.city}, ${o.state} ${o.postalCode}</span></div>
            <div class="od-row"><span class="label">Copay</span><span>$${(o.copayAmount||0).toFixed(2)} ${o.copayCollected?'(Collected)':''}</span></div>
            <div class="od-row"><span class="label">Delivery Fee</span><span>$${(o.deliveryFee||0).toFixed(2)}</span></div>
            <div class="od-row"><span class="label">Notes</span><span>${o.deliveryNotes||'-'}</span></div></div>
        </div>
        <div class="mt-2"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.street+', '+o.city+', '+o.state)}" target="_blank" class="btn btn-sm btn-outline">${Icons.mapPin} Open in Google Maps</a></div>`;
    document.getElementById('detail-modal').classList.add('active');
}

load();
</script>
</body></html>
