<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin - RX Expresss</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand"><h2>RX Expresss</h2><small>Admin Panel</small></div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>
    <main class="main-content">
        <div class="topbar"><h1 id="page-title">Dashboard Overview</h1></div>
        <div class="page-body">
            <div id="alert-area"></div>
            <div class="row mb-3" id="stats-row"></div>
            <div class="row">
                <div class="col"><div class="card"><div class="card-header">Recent Orders</div><div class="card-body table-wrap"><table><thead><tr><th>Order #</th><th>QR</th><th>Recipient</th><th>Status</th><th>Date</th></tr></thead><tbody id="recent-orders"><tr><td colspan="5" class="text-center"><span class="spinner"></span></td></tr></tbody></table></div></div></div>
            </div>
        </div>
    </main>
</div>
<script src="/js/api-service.js"></script>
<script>
if (!ApiService.requireAuth('Admin')) throw '';
const adminNav = [
    { id:'overview', label:'Overview', href:'/admin/index.html', icon:Icons.dashboard },
    { id:'users', label:'Users', href:'/admin/users.html', icon:Icons.users },
    { id:'pharmacies', label:'Pharmacies', href:'/admin/pharmacies.html', icon:Icons.pharmacy },
    { id:'drivers', label:'Drivers', href:'/admin/drivers.html', icon:Icons.truck },
    { id:'orders', label:'Orders', href:'/admin/orders.html', icon:Icons.package },
    { id:'routes', label:'Routes', href:'/admin/routes.html', icon:Icons.route },
    { id:'pricing', label:'Pricing', href:'/admin/pricing.html', icon:Icons.dollar },
    { id:'scanning', label:'QR Scanning', href:'/admin/scanning.html', icon:Icons.qrcode },
    { id:'zones', label:'Service Zones', href:'/admin/zones.html', icon:Icons.mapPin },
    { id:'reports', label:'Reports', href:'/admin/reports.html', icon:Icons.barChart },
];
setupSidebar(adminNav, 'overview');

(async () => {
    try {
        const d = await ApiService.get('/admin/dashboard');
        const s = d.stats;
        document.getElementById('stats-row').innerHTML = `
            <div class="col"><div class="stat-card"><div class="stat-icon teal">${Icons.users}</div><div class="stat-value">${s.total_users}</div><div class="stat-label">Total Users</div></div></div>
            <div class="col"><div class="stat-card"><div class="stat-icon blue">${Icons.pharmacy}</div><div class="stat-value">${s.total_pharmacies}</div><div class="stat-label">Pharmacies</div></div></div>
            <div class="col"><div class="stat-card"><div class="stat-icon green">${Icons.truck}</div><div class="stat-value">${s.active_drivers}</div><div class="stat-label">Active Drivers</div></div></div>
            <div class="col"><div class="stat-card"><div class="stat-icon amber">${Icons.package}</div><div class="stat-value">${s.total_orders}</div><div class="stat-label">Total Orders</div></div></div>`;
        const orders = await ApiService.get('/admin/orders?limit=10');
        const tbody = document.getElementById('recent-orders');
        tbody.innerHTML = orders.orders.length ? orders.orders.map(o => `<tr><td><strong>${o.orderNumber}</strong></td><td>${o.qrCode||'-'}</td><td>${o.recipientName}</td><td>${statusBadge(o.status)}</td><td>${formatDate(o.createdAt)}</td></tr>`).join('') : '<tr><td colspan="5" class="text-center text-gray">No orders yet</td></tr>';
    } catch(e) { showAlert('alert-area','danger',e.message); }
})();
</script>
</body></html>
