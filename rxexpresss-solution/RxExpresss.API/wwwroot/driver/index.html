<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Driver Portal - RX Expresss</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand"><h2>RX Expresss</h2><small>Driver Portal</small></div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>
    <main class="main-content">
        <div class="topbar">
            <h1>My Deliveries</h1>
            <div class="toggle-group">
                <button class="toggle-btn" id="t-on" onclick="setStatus('available')">Online</button>
                <button class="toggle-btn" id="t-off" onclick="setStatus('offline')">Offline</button>
            </div>
        </div>
        <div class="page-body">
            <div id="alert-area"></div>
            <div id="deliveries"><div class="text-center mt-3"><span class="spinner"></span> Loading...</div></div>
        </div>
    </main>
</div>
<script src="/js/api-service.js"></script>
<script>
if(!ApiService.requireAuth('Driver'))throw'';
setupSidebar([
    {id:'deliveries',label:'My Deliveries',href:'/driver/index.html',icon:Icons.list},
],'deliveries');

let myStatus='offline';
async function loadProfile(){try{const p=await ApiService.get('/driver-portal/profile');myStatus=p.status;updateToggle();}catch{}}
function updateToggle(){document.getElementById('t-on').className='toggle-btn'+(myStatus==='available'?' active':'');document.getElementById('t-off').className='toggle-btn'+(myStatus==='offline'?' off':'');}
async function setStatus(s){await ApiService.put(`/driver-portal/status?status=${s}`);myStatus=s;updateToggle();}

async function loadDeliveries(){
    try{
        const d=await ApiService.get('/driver-portal/deliveries');
        const el=document.getElementById('deliveries');
        if(!d.deliveries.length){el.innerHTML='<div class="empty-state"><h3>No Active Deliveries</h3><p>No deliveries assigned to you right now.</p></div>';return;}
        el.innerHTML=d.deliveries.map(o=>`
            <div class="delivery-card">
                <div class="dc-header"><span class="dc-qr">${o.qrCode||o.orderNumber}</span>${statusBadge(o.status)}</div>
                <div class="dc-details">
                    <div><strong>To:</strong> ${o.recipientName}</div>
                    <div><strong>Phone:</strong> ${o.recipientPhone}</div>
                    <div><strong>Address:</strong> ${o.street}, ${o.city}, ${o.state} ${o.postalCode}</div>
                    ${o.copayAmount>0?`<div><strong>Copay:</strong> $${o.copayAmount.toFixed(2)} ${o.copayCollected?'(Collected)':'(Pending)'}</div>`:''}
                </div>
                ${o.deliveryNotes?`<div class="mt-1 text-sm text-gray">Notes: ${o.deliveryNotes}</div>`:''}
                <div class="dc-actions">
                    ${o.status==='assigned'?`<button class="btn btn-sm btn-warning" onclick="upd(${o.id},'picked_up')">Pick Up</button>`:''}
                    ${o.status==='picked_up'?`<button class="btn btn-sm btn-info" onclick="upd(${o.id},'in_transit')">Start Transit</button>`:''}
                    ${o.status==='in_transit'?`<button class="btn btn-sm btn-primary" onclick="upd(${o.id},'out_for_delivery')">Out for Delivery</button>`:''}
                    ${o.status==='out_for_delivery'?`<button class="btn btn-sm btn-success" onclick="complete(${o.id})">Complete Delivery</button>`:''}
                    ${o.copayAmount>0&&!o.copayCollected?`<button class="btn btn-sm btn-outline" onclick="copay(${o.id})">Collect Copay</button>`:''}
                </div>
            </div>`).join('');
    }catch(e){showAlert('alert-area','danger',e.message);}
}
async function upd(id,s){await ApiService.put(`/driver-portal/deliveries/${id}/status?status=${s}`);showAlert('alert-area','success',`Status: ${s}`);loadDeliveries();}
async function complete(id){if(!confirm('Confirm delivery completed?'))return;await ApiService.post(`/driver-portal/deliveries/${id}/pod`,{recipientName:'Recipient'});showAlert('alert-area','success','Delivered!');loadDeliveries();}
async function copay(id){await ApiService.post(`/driver-portal/deliveries/${id}/collect-copay`);showAlert('alert-area','success','Copay collected!');loadDeliveries();}

loadProfile();
loadDeliveries();
</script>
</body></html>
