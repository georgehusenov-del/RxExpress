<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Order - RX Expresss</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav class="navbar"><a href="/pharmacy/index.html" class="brand">RX Expresss</a>
    <div class="nav-links"><a href="/pharmacy/index.html">Dashboard</a><a href="/pharmacy/create-order.html" class="active">New Order</a></div>
    <div class="user-info" id="nav-user"></div>
</nav>
<div class="container">
    <div class="page-header"><h1>Create New Delivery</h1></div>
    <div id="alert-area"></div>
    <div class="card"><div class="card-body">
        <form id="order-form">
            <h3 class="mb-2">Recipient Information</h3>
            <div class="row"><div class="col"><div class="form-group"><label>Recipient Name *</label><input class="form-control" id="r-name" required></div></div>
            <div class="col"><div class="form-group"><label>Phone *</label><input class="form-control" id="r-phone" required></div></div></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="r-email"></div>

            <h3 class="mb-2 mt-3">Delivery Address</h3>
            <div class="form-group"><label>Street *</label><input class="form-control" id="a-street" required></div>
            <div class="row"><div class="col"><div class="form-group"><label>Apt/Unit</label><input class="form-control" id="a-apt"></div></div>
            <div class="col"><div class="form-group"><label>City *</label><input class="form-control" id="a-city" value="New York" required></div></div></div>
            <div class="row"><div class="col"><div class="form-group"><label>State *</label><input class="form-control" id="a-state" value="NY" required></div></div>
            <div class="col"><div class="form-group"><label>Postal Code *</label><input class="form-control" id="a-zip" required></div></div></div>

            <h3 class="mb-2 mt-3">Delivery Options</h3>
            <div class="row"><div class="col"><div class="form-group"><label>Delivery Type</label>
                <select class="form-control" id="d-type"><option value="next_day">Next-Day ($5.99)</option><option value="same_day">Same-Day ($9.99)</option><option value="priority">Priority ($14.99)</option></select></div></div>
            <div class="col"><div class="form-group"><label>Copay Amount ($)</label><input type="number" step="0.01" class="form-control" id="d-copay" value="0"></div></div></div>
            <div class="form-group"><label>Delivery Notes</label><textarea class="form-control" id="d-notes" rows="2"></textarea></div>

            <div class="mt-3"><button type="submit" class="btn btn-primary btn-lg" id="submit-btn">Create Order</button></div>
        </form>
    </div></div>
</div>
<script src="/js/api-service.js"></script>
<script>
    if (!ApiService.requireAuth('Pharmacy')) throw '';
    setupNav();
    let pharmacyId = null;
    (async () => {
        const p = await ApiService.get('/pharmacies/my');
        pharmacyId = p.id;
    })();
    document.getElementById('order-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!pharmacyId) { showAlert('alert-area', 'danger', 'Pharmacy not found'); return; }
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating...';
        try {
            const data = await ApiService.post('/orders', {
                pharmacyId, deliveryType: document.getElementById('d-type').value,
                recipientName: document.getElementById('r-name').value, recipientPhone: document.getElementById('r-phone').value,
                recipientEmail: document.getElementById('r-email').value || null,
                street: document.getElementById('a-street').value, aptUnit: document.getElementById('a-apt').value || null,
                city: document.getElementById('a-city').value, state: document.getElementById('a-state').value,
                postalCode: document.getElementById('a-zip').value,
                copayAmount: parseFloat(document.getElementById('d-copay').value) || 0,
                deliveryNotes: document.getElementById('d-notes').value || null
            });
            showAlert('alert-area', 'success', `Order created! #${data.order_number} | QR: ${data.qr_code}`);
            document.getElementById('order-form').reset();
        } catch (err) { showAlert('alert-area', 'danger', err.message); }
        btn.disabled = false; btn.textContent = 'Create Order';
    });
</script>
</body>
</html>
