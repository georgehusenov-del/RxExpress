<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>New Order - RX Expresss</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand"><h2>RX Expresss</h2><small>Pharmacy Portal</small></div><nav class="sidebar-nav" id="sidebar-nav"></nav><div class="sidebar-footer" id="sidebar-footer"></div></aside>
    <main class="main-content">
        <div class="topbar"><h1>Create New Delivery</h1></div>
        <div class="page-body"><div id="alert-area"></div>
            <div class="card"><div class="card-body">
                <form id="order-form">
                    <h3 class="mb-2">Recipient</h3>
                    <div class="row"><div class="col"><div class="form-group"><label>Name *</label><input class="form-control" id="r-name" required></div></div><div class="col"><div class="form-group"><label>Phone *</label><input class="form-control" id="r-phone" required></div></div></div>
                    <h3 class="mb-2 mt-2">Delivery Address</h3>
                    <div class="form-group"><label>Street *</label><input class="form-control" id="a-st" required></div>
                    <div class="row"><div class="col"><div class="form-group"><label>City *</label><input class="form-control" id="a-city" value="New York" required></div></div><div class="col"><div class="form-group"><label>State</label><input class="form-control" id="a-state" value="NY"></div></div><div class="col"><div class="form-group"><label>Zip *</label><input class="form-control" id="a-zip" required></div></div></div>
                    <h3 class="mb-2 mt-2">Options</h3>
                    <div class="row"><div class="col"><div class="form-group"><label>Type</label><select class="form-control" id="d-type"><option value="next_day">Next-Day ($5.99)</option><option value="same_day">Same-Day ($9.99)</option><option value="priority">Priority ($14.99)</option></select></div></div><div class="col"><div class="form-group"><label>Copay ($)</label><input type="number" step="0.01" class="form-control" id="d-copay" value="0"></div></div></div>
                    <div class="form-group"><label>Notes</label><textarea class="form-control" id="d-notes" rows="2"></textarea></div>
                    <button type="submit" class="btn btn-primary btn-lg" id="sub-btn">Create Order</button>
                </form>
            </div></div>
        </div>
    </main>
</div>
<script src="/js/api-service.js"></script>
<script>
if(!ApiService.requireAuth('Pharmacy'))throw'';
setupSidebar([{id:'dashboard',label:'Dashboard',href:'/pharmacy/index.html',icon:Icons.dashboard},{id:'create',label:'New Order',href:'/pharmacy/create-order.html',icon:Icons.plus}],'create');
let pid=null;
(async()=>{const p=await ApiService.get('/pharmacies/my');pid=p.id;})();
document.getElementById('order-form').addEventListener('submit',async(e)=>{
    e.preventDefault();if(!pid){showAlert('alert-area','danger','Pharmacy not found');return;}
    const btn=document.getElementById('sub-btn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Creating...';
    try{
        const d=await ApiService.post('/orders',{pharmacyId:pid,deliveryType:document.getElementById('d-type').value,recipientName:document.getElementById('r-name').value,recipientPhone:document.getElementById('r-phone').value,street:document.getElementById('a-st').value,city:document.getElementById('a-city').value,state:document.getElementById('a-state').value,postalCode:document.getElementById('a-zip').value,copayAmount:parseFloat(document.getElementById('d-copay').value)||0,deliveryNotes:document.getElementById('d-notes').value||null});
        showAlert('alert-area','success',`Order created! #${d.order_number} | QR: ${d.qr_code}`);
        document.getElementById('order-form').reset();
    }catch(err){showAlert('alert-area','danger',err.message);}
    btn.disabled=false;btn.textContent='Create Order';
});
</script>
</body></html>
